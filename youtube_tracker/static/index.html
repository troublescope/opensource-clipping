<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="YouTube Tracker — Local playlist snapshot tracker for clipping workflow">
  <title>YouTube Tracker</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
</head>
<body>

<div class="app-shell">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <h1><span class="icon">📋</span> <span>YT Tracker</span></h1>
      <div class="subtitle">Local Snapshot Tracker</div>
    </div>
    <ul class="sidebar-nav" id="sidebar-nav">
      <li><a href="#/" data-route="/" class="active">
        <span class="nav-icon">🏠</span> <span>Dashboard</span>
      </a></li>
      <li><a href="#/channels" data-route="/channels">
        <span class="nav-icon">📺</span> <span>Channels</span>
      </a></li>
      <li><a href="#/duplicates" data-route="/duplicates">
        <span class="nav-icon">🔁</span> <span>Duplicates</span>
      </a></li>
      <li><a href="#/search" data-route="/search">
        <span class="nav-icon">🔍</span> <span>Search</span>
      </a></li>
      <li><a href="#/settings" data-route="/settings">
        <span class="nav-icon">⚙️</span> <span>Settings</span>
      </a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="main-content" id="app">
    <!-- Rendered by app.js -->
  </main>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<!-- Modal Overlay -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content">
    <!-- Rendered dynamically -->
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
