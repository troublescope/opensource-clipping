services:
  backend:
    build: .
    container_name: osc-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/__pycache__
      - ./outputs:/app/outputs
      - ./uploads:/app/uploads
      - ./custom_fonts:/app/custom_fonts
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - PEXELS_API_KEY=${PEXELS_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-1}
    restart: unless-stopped
    # Uncomment below for GPU support (requires NVIDIA Container Toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  frontend:
    build: ./web/dashboard
    container_name: osc-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./web/dashboard:/app
      - /app/node_modules
    environment:
      - VITE_API_TARGET=http://backend:8000
    restart: unless-stopped
    depends_on:
      - backend
